<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taimeris</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #191919;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}
.wrap {
  width: 100%;
  max-width: 380px;
}
.clock {
  font-size: 52px;
  font-weight: 300;
  color: #e3e3e3;
  font-variant-numeric: tabular-nums;
  letter-spacing: 4px;
  text-align: center;
  margin-bottom: 8px;
  transition: color 0.3s;
}
.clock.running { color: #2ecc71; }

.status {
  text-align: center;
  font-size: 13px;
  color: #555;
  margin-bottom: 20px;
  min-height: 18px;
}

.btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 24px;
}
.btn {
  border: 0.5px solid #444;
  background: #252525;
  color: #ccc;
  border-radius: 6px;
  padding: 9px 24px;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { background: #2e2e2e; border-color: #666; }
.btn.start { border-color: #2ecc71; color: #2ecc71; }
.btn.start:hover { background: #1a2e1a; }
.btn.stop { border-color: #e74c3c; color: #e74c3c; }
.btn.stop:hover { background: #2e1a1a; }
.btn:disabled { opacity: 0.3; cursor: default; }

.log {
  border-top: 0.5px solid #2a2a2a;
  padding-top: 16px;
  display: none;
}
.log-title {
  color: #444;
  font-size: 10px;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.log-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: #777;
  padding: 5px 0;
  border-bottom: 0.5px solid #222;
}
.log-row:last-of-type { border-bottom: none; }
.log-row .dur { color: #aaa; font-variant-numeric: tabular-nums; }
.total-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: #ccc;
  padding: 10px 0 0;
  border-top: 0.5px solid #333;
  margin-top: 6px;
}
.total-row .dur { color: #e3e3e3; }
</style>
</head>
<body>
<div class="wrap">
  <div class="clock" id="clock">00:00:00</div>
  <div class="status" id="status">Nospied Sākt</div>
  <div class="btn-row">
    <button class="btn start" id="startBtn" onclick="startTimer()">▶ Sākt</button>
    <button class="btn stop" id="stopBtn" onclick="stopTimer()" disabled>⏹ Apturēt</button>
  </div>
  <div class="log" id="log">
    <div class="log-title">ŠODIEN</div>
    <div id="logRows"></div>
    <div class="total-row">
      <span>Kopā</span>
      <span class="dur" id="totalEl">—</span>
    </div>
  </div>
</div>

<script>
let running = false, startMs = null, interval = null;
let sessions = [], totalMs = 0, sessionCount = 0;

function pad(n){ return String(n).padStart(2,'0'); }

function fmtClock(ms){
  const s = Math.floor(ms/1000);
  return pad(Math.floor(s/3600)) + ':' + pad(Math.floor((s%3600)/60)) + ':' + pad(s%60);
}

function fmtDur(ms){
  const s = Math.floor(ms/1000);
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;
  if(h > 0) return h + 'h ' + m + 'min';
  if(m > 0) return m + 'min ' + sec + 'sek';
  return sec + 'sek';
}

function startTimer(){
  startMs = Date.now();
  running = true;
  sessionCount++;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  document.getElementById('clock').classList.add('running');
  document.getElementById('status').textContent = 'Darbs notiek...';
  clearInterval(interval);
  interval = setInterval(()=>{
    document.getElementById('clock').textContent = fmtClock(Date.now() - startMs);
  }, 1000);
}

function stopTimer(){
  if(!running) return;
  clearInterval(interval);
  const elapsed = Date.now() - startMs;
  running = false;
  totalMs += elapsed;
  sessions.push({ n: sessionCount, ms: elapsed });
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('clock').classList.remove('running');
  document.getElementById('clock').textContent = fmtClock(elapsed);
  document.getElementById('status').textContent = 'Apturēts · ' + fmtDur(elapsed);
  renderLog();
}

function renderLog(){
  document.getElementById('log').style.display = 'block';
  document.getElementById('logRows').innerHTML = sessions.map(s =>
    `<div class="log-row"><span>Sesija ${s.n}</span><span class="dur">${fmtDur(s.ms)}</span></div>`
  ).join('');
  document.getElementById('totalEl').textContent = fmtDur(totalMs);
}
</script>
</body>
</html>
